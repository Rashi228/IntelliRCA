services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: intellirca-kafka
    user: root
    ports:
    - 9092:9092
    environment:
    - KAFKA_NODE_ID=1
    - KAFKA_PROCESS_ROLES=broker,controller
    - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
    - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
    - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
    - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
    - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
    - kafka_data:/tmp/kafka-logs
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:latest
    container_name: intellirca-qdrant
    ports:
    - 6333:6333
    - 6334:6334
    volumes:
    - qdrant_data:/qdrant/storage
    restart: unless-stopped
  neo4j:
    image: neo4j:5.12
    container_name: intellirca-neo4j
    ports:
    - 7474:7474
    - 7687:7687
    environment:
    - NEO4J_AUTH=neo4j/intellirca_secret_password
    - NEO4J_PLUGINS=["apoc"]
    volumes:
    - neo4j_data:/data
    restart: unless-stopped
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: intellirca-api
    ports:
    - 8000:8000
    env_file:
    - .env
    depends_on:
    - kafka
    restart: unless-stopped
  normalization_worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: intellirca-normalization-worker
    env_file:
    - .env
    depends_on:
    - kafka
    restart: unless-stopped
  semantic_worker:
    build:
      context: .
      dockerfile: Dockerfile.semantic_worker
    container_name: intellirca-semantic-worker
    env_file:
    - .env
    depends_on:
    - kafka
    - qdrant
    restart: unless-stopped
  semantic_api:
    build:
      context: .
      dockerfile: Dockerfile.semantic_api
    container_name: intellirca-semantic-api
    ports:
    - 8001:8001
    env_file:
    - .env
    depends_on:
    - qdrant
    restart: unless-stopped
  correlation_worker:
    build:
      context: .
      dockerfile: Dockerfile.correlation
    container_name: intellirca-correlation-worker
    ports:
    - 8082:8082
    env_file:
    - .env
    depends_on:
    - kafka
    - qdrant
    restart: unless-stopped
  kg_worker:
    build:
      context: .
      dockerfile: Dockerfile.kg_worker
    container_name: intellirca-kg-worker
    env_file:
    - .env
    depends_on:
    - kafka
    - neo4j
    restart: unless-stopped
  kg_api:
    build:
      context: .
      dockerfile: Dockerfile.kg_api
    container_name: intellirca-kg-api
    ports:
    - 8084:8084
    env_file:
    - .env
    depends_on:
    - neo4j
    restart: unless-stopped
  rca_worker:
    build:
      context: .
      dockerfile: Dockerfile.rca_worker
    container_name: intellirca-rca-worker
    ports:
    - 8086:8086
    env_file:
    - .env
    restart: unless-stopped
  rca_api:
    build:
      context: .
      dockerfile: Dockerfile.rca_api
    container_name: intellirca-rca-api
    ports:
    - 8085:8085
    env_file:
    - .env
    depends_on:
    - neo4j
    - qdrant
    restart: unless-stopped
  memory_worker:
    build:
      context: .
      dockerfile: Dockerfile.memory_worker
    container_name: intellirca-memory-worker
    env_file:
    - .env
    depends_on:
    - kafka
    - neo4j
    - qdrant
    restart: unless-stopped
  memory_api:
    build:
      context: .
      dockerfile: Dockerfile.memory_api
    container_name: intellirca-memory-api
    ports:
    - 8087:8087
    env_file:
    - .env
    depends_on:
    - neo4j
    - qdrant
    restart: unless-stopped
volumes:
  kafka_data: null
  qdrant_data: null
  neo4j_data: null
